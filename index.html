
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Site en maintenance</title>
<style>
  :root{
    --bg1:#07111f;
    --bg2:#0f2a45;
    --card:rgba(255,255,255,.10);
    --line:rgba(255,255,255,.20);
    --text:#f8fafc;
    --muted:#cbd5e1;
    --accent:#38bdf8;
    --yellow:#facc15;
    --orange:#fb923c;
    --green:#22c55e;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, rgba(56,189,248,.25), transparent 34%),
      radial-gradient(circle at bottom right, rgba(250,204,21,.16), transparent 32%),
      linear-gradient(135deg,var(--bg1),var(--bg2));
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow:hidden;
  }

  .page{
    width:min(980px,100%);
    min-height:620px;
    border:1px solid var(--line);
    border-radius:30px;
    background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.06));
    box-shadow:0 30px 80px rgba(0,0,0,.42);
    backdrop-filter:blur(14px);
    overflow:hidden;
    position:relative;
  }

  .topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:18px 22px;
    border-bottom:1px solid var(--line);
    background:rgba(2,6,23,.22);
  }

  .signal{
    width:13px;height:13px;border-radius:50%;
    background:var(--orange);
    box-shadow:0 0 18px var(--orange);
  }

  .topbar span{
    color:var(--muted);
    font-size:14px;
    letter-spacing:.12em;
    text-transform:uppercase;
  }

  .content{
    display:grid;
    grid-template-columns:1fr 1.1fr;
    gap:28px;
    padding:42px;
    align-items:center;
  }

  h1{
    margin:0 0 18px;
    font-size:clamp(34px,6vw,64px);
    line-height:.95;
    letter-spacing:-.05em;
  }

  p{
    margin:0;
    max-width:520px;
    color:var(--muted);
    font-size:clamp(17px,2.5vw,21px);
    line-height:1.55;
  }

  .loaderBlock{
    margin-top:34px;
    display:flex;
    align-items:center;
    gap:18px;
  }

  .wheel{
    width:92px;
    height:92px;
    border-radius:50%;
    position:relative;
    animation:spin 1s linear infinite;
    background:
      radial-gradient(circle at center, var(--yellow) 0 8px, #0f172a 9px 13px, transparent 14px),
      conic-gradient(from 0deg,
        var(--accent) 0deg 18deg, transparent 18deg 42deg,
        var(--yellow) 42deg 60deg, transparent 60deg 84deg,
        var(--orange) 84deg 102deg, transparent 102deg 126deg,
        var(--accent) 126deg 144deg, transparent 144deg 168deg,
        var(--yellow) 168deg 186deg, transparent 186deg 210deg,
        var(--orange) 210deg 228deg, transparent 228deg 252deg,
        var(--accent) 252deg 270deg, transparent 270deg 294deg,
        var(--yellow) 294deg 312deg, transparent 312deg 336deg,
        var(--orange) 336deg 360deg);
    box-shadow:
      0 0 26px rgba(56,189,248,.35),
      inset 0 0 0 7px rgba(255,255,255,.14),
      inset 0 0 0 14px #0f172a,
      inset 0 0 0 18px rgba(250,204,21,.9),
      inset 0 0 0 24px rgba(15,23,42,.95);
  }

  .wheel::before{
    content:"";
    position:absolute;
    inset:20px;
    border-radius:50%;
    background:
      linear-gradient(0deg, transparent 44%, rgba(255,255,255,.72) 45% 55%, transparent 56%),
      linear-gradient(45deg, transparent 44%, rgba(255,255,255,.58) 45% 55%, transparent 56%),
      linear-gradient(90deg, transparent 44%, rgba(56,189,248,.74) 45% 55%, transparent 56%),
      linear-gradient(135deg, transparent 44%, rgba(250,204,21,.72) 45% 55%, transparent 56%);
    filter:drop-shadow(0 0 5px rgba(56,189,248,.35));
  }

  .wheel::after{
    content:"";
    position:absolute;
    inset:33px;
    border-radius:50%;
    background:radial-gradient(circle, #f8fafc 0 4px, var(--yellow) 5px 12px, #0f172a 13px);
    box-shadow:0 0 12px rgba(250,204,21,.55);
  }

  .loadingText{
    font-size:15px;
    color:#e0f2fe;
    letter-spacing:.04em;
  }

  .scene{
    height:420px;
    position:relative;
    border-radius:26px;
    overflow:hidden;
    border:1px solid var(--line);
    background:
      linear-gradient(to bottom,rgba(14,165,233,.18),transparent 45%),
      linear-gradient(to bottom,#14213a 0%,#0f172a 65%,#111827 65%);
  }

  .moon{
    position:absolute;
    top:30px;
    right:38px;
    width:58px;height:58px;
    border-radius:50%;
    background:#fde68a;
    box-shadow:0 0 40px rgba(253,230,138,.45);
  }

  .station{
    position:absolute;
    left:36px;
    right:36px;
    bottom:132px;
    height:150px;
  }

  .roof{
    position:absolute;
    top:0;left:0;right:0;
    height:40px;
    background:linear-gradient(90deg,#334155,#64748b,#334155);
    clip-path:polygon(4% 0,96% 0,100% 100%,0 100%);
    box-shadow:0 12px 22px rgba(0,0,0,.25);
  }

  .building{
    position:absolute;
    left:26px;right:26px;top:38px;bottom:0;
    background:linear-gradient(180deg,#e5e7eb,#94a3b8);
    border-radius:10px 10px 0 0;
    border:3px solid rgba(255,255,255,.18);
  }

  .clock{
    position:absolute;
    top:14px;left:50%;
    width:48px;height:48px;
    margin-left:-24px;
    border-radius:50%;
    background:#f8fafc;
    border:4px solid #1e293b;
  }

  .clock::before{
    content:"";
    position:absolute;
    left:22px;top:9px;
    width:3px;height:16px;
    background:#1e293b;
    transform-origin:bottom;
    transform:rotate(40deg);
  }

  .clock::after{
    content:"";
    position:absolute;
    left:22px;top:22px;
    width:14px;height:3px;
    background:#1e293b;
  }

  .windows{
    position:absolute;
    left:28px;right:28px;bottom:28px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;
  }

  .windows i{
    height:36px;
    display:block;
    border-radius:6px;
    background:linear-gradient(180deg,#bae6fd,#38bdf8);
    box-shadow:0 0 18px rgba(56,189,248,.35);
  }

  .platform{
    position:absolute;
    left:0;right:0;bottom:108px;
    height:24px;
    background:linear-gradient(90deg,#475569,#94a3b8,#475569);
  }

  .rails{
    position:absolute;
    left:0;right:0;bottom:62px;
    height:58px;
    background:repeating-linear-gradient(90deg,transparent 0 28px,rgba(255,255,255,.25) 28px 34px,transparent 34px 62px);
  }

  .rails::before,.rails::after{
    content:"";
    position:absolute;
    left:0;right:0;
    height:7px;
    background:#cbd5e1;
    border-radius:99px;
  }
  .rails::before{top:12px}
  .rails::after{bottom:12px}

  .train{
    position:absolute;
    left:36px;
    right:36px;
    bottom:82px;
    height:80px;
    border-radius:24px 12px 12px 24px;
    background:linear-gradient(180deg,#f8fafc 0 46%,#e11d48 47% 57%,#1e40af 58% 100%);
    box-shadow:0 18px 25px rgba(0,0,0,.28);
    animation:trainFloat 2.6s ease-in-out infinite;
  }

  .train::before{
    content:"";
    position:absolute;
    right:-22px;top:10px;
    border-left:26px solid #1e40af;
    border-top:30px solid transparent;
    border-bottom:30px solid transparent;
  }

  .train .frontLight{
    position:absolute;
    right:4px;top:50px;
    width:18px;height:12px;
    border-radius:99px;
    background:#fef08a;
    box-shadow:0 0 22px #fef08a;
  }

  .train .win{
    position:absolute;
    top:15px;
    width:52px;height:25px;
    background:linear-gradient(180deg,#7dd3fc,#0ea5e9);
    border-radius:8px;
  }

  .train .w1{left:36px}.train .w2{left:104px}.train .w3{left:172px}.train .w4{left:240px}

  .agent{
    position:absolute;
    bottom:128px;
    width:28px;height:60px;
    animation:bob 1.8s ease-in-out infinite;
  }

  .agent.one{left:66px}
  .agent.two{right:72px;animation-delay:.4s}

  .agent .head{
    width:22px;height:22px;border-radius:50%;
    background:#f3c79b;
    margin:auto;
  }

  .agent .body{
    width:28px;height:31px;
    margin-top:3px;
    background:linear-gradient(90deg,#fb923c 0 45%,#fde047 45% 55%,#fb923c 55%);
    border-radius:8px 8px 4px 4px;
  }

  .agent .legs{
    width:22px;height:14px;margin:auto;
    background:linear-gradient(90deg,#0f172a 0 42%,transparent 42% 58%,#0f172a 58%);
  }

  .dots{
    margin-top:10px;
  }

  .dots span{
    display:inline-block;
    width:7px;height:7px;
    margin-right:5px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2){animation-delay:.18s}
  .dots span:nth-child(3){animation-delay:.36s}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-5px)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes trainFloat{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}

  @media(max-width:820px){
    body{padding:12px;overflow:auto}
    .page{min-height:auto;border-radius:22px}
    .content{grid-template-columns:1fr;padding:28px;gap:30px}
    .scene{height:360px}
    .train .w4{display:none}
  }

  @media(max-width:440px){
    .content{padding:22px}
    .loaderBlock{align-items:flex-start}
    .wheel{width:74px;height:74px}
    .scene{height:330px}
    .train{left:20px;right:26px}
    .train .win{width:42px}
    .train .w1{left:24px}.train .w2{left:78px}.train .w3{left:132px}
    .station{left:20px;right:20px}
  }
</style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="signal"></div>
      <span>Maintenance en cours</span>
    </div>

    <section class="content">
      <div>
        <h1>Site en maintenance</h1>
        <p>Nous nous excusons pour la gêne occasionnée. Le site sera opérationnel rapidement.</p>

        <div class="loaderBlock">
          <div class="wheel" aria-label="Chargement"></div>
          <div>
            <div class="loadingText">Intervention technique en cours</div>
            <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>

      <div class="scene" aria-hidden="true">
        <div class="moon"></div>
        <div class="station">
          <div class="roof"></div>
          <div class="building">
            <div class="clock"></div>
            <div class="windows"><i></i><i></i><i></i><i></i><i></i></div>
          </div>
        </div>
        <div class="platform"></div>
        <div class="agent one"><div class="head"></div><div class="body"></div><div class="legs"></div></div>
        <div class="agent two"><div class="head"></div><div class="body"></div><div class="legs"></div></div>
        <div class="train">
          <span class="win w1"></span>
          <span class="win w2"></span>
          <span class="win w3"></span>
          <span class="win w4"></span>
          <span class="frontLight"></span>
        </div>
        <div class="rails"></div>
      </div>
    </section>
  </main>
</body>
</html>
