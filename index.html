
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta http-equiv="refresh" content="300">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Site en maintenance</title>

<style>
:root{
  --bg1:#06111f;
  --bg2:#102f4f;
  --line:rgba(255,255,255,.20);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --accent:#38bdf8;
  --yellow:#facc15;
  --orange:#fb923c;
  --red:#e11d48;
  --blue:#1d4ed8;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
}

body{
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(56,189,248,.25), transparent 34%),
    radial-gradient(circle at bottom right, rgba(250,204,21,.16), transparent 32%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  overflow:hidden;
}

.page{
  width:min(980px,100%);
  min-height:620px;
  border:1px solid var(--line);
  border-radius:30px;
  background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.06));
  box-shadow:0 30px 80px rgba(0,0,0,.42);
  backdrop-filter:blur(14px);
  overflow:hidden;
  position:relative;
}

.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px 22px;
  border-bottom:1px solid var(--line);
  background:rgba(2,6,23,.22);
}

.signal{
  width:13px;
  height:13px;
  border-radius:50%;
  background:var(--orange);
  box-shadow:0 0 18px var(--orange);
  animation:signalPulse 1.8s infinite ease-in-out;
}

.topbar span{
  color:var(--muted);
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.content{
  display:grid;
  grid-template-columns:1fr 1.1fr;
  gap:28px;
  padding:42px;
  align-items:center;
}

h1{
  margin:0 0 18px;
  font-size:clamp(34px,6vw,64px);
  line-height:.95;
  letter-spacing:-.05em;
}

p{
  margin:0;
  max-width:520px;
  color:var(--muted);
  font-size:clamp(17px,2.5vw,21px);
  line-height:1.55;
}

.loaderBlock{
  margin-top:34px;
  display:flex;
  align-items:center;
  gap:18px;
}

.wheel{
  width:92px;
  height:92px;
  border-radius:50%;
  position:relative;
  animation:spin 1s linear infinite;
  background:
    radial-gradient(circle at center, var(--yellow) 0 8px, #0f172a 9px 13px, transparent 14px),
    conic-gradient(from 0deg,
      var(--accent) 0deg 18deg, transparent 18deg 42deg,
      var(--yellow) 42deg 60deg, transparent 60deg 84deg,
      var(--orange) 84deg 102deg, transparent 102deg 126deg,
      var(--accent) 126deg 144deg, transparent 144deg 168deg,
      var(--yellow) 168deg 186deg, transparent 186deg 210deg,
      var(--orange) 210deg 228deg, transparent 228deg 252deg,
      var(--accent) 252deg 270deg, transparent 270deg 294deg,
      var(--yellow) 294deg 312deg, transparent 312deg 336deg,
      var(--orange) 336deg 360deg);
  box-shadow:
    0 0 26px rgba(56,189,248,.35),
    inset 0 0 0 7px rgba(255,255,255,.14),
    inset 0 0 0 14px #0f172a,
    inset 0 0 0 18px rgba(250,204,21,.9),
    inset 0 0 0 24px rgba(15,23,42,.95);
}

.wheel::before{
  content:"";
  position:absolute;
  inset:20px;
  border-radius:50%;
  background:
    linear-gradient(0deg, transparent 44%, rgba(255,255,255,.72) 45% 55%, transparent 56%),
    linear-gradient(45deg, transparent 44%, rgba(255,255,255,.58) 45% 55%, transparent 56%),
    linear-gradient(90deg, transparent 44%, rgba(56,189,248,.74) 45% 55%, transparent 56%),
    linear-gradient(135deg, transparent 44%, rgba(250,204,21,.72) 45% 55%, transparent 56%);
}

.wheel::after{
  content:"";
  position:absolute;
  inset:33px;
  border-radius:50%;
  background:radial-gradient(circle, #f8fafc 0 4px, var(--yellow) 5px 12px, #0f172a 13px);
  box-shadow:0 0 12px rgba(250,204,21,.55);
}

.loadingText{
  font-size:15px;
  color:#e0f2fe;
  letter-spacing:.04em;
}

.dots{
  margin-top:10px;
}

.dots span{
  display:inline-block;
  width:7px;
  height:7px;
  margin-right:5px;
  border-radius:50%;
  background:var(--accent);
  animation:pulse 1.2s infinite ease-in-out;
}

.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}

.scene{
  height:420px;
  position:relative;
  border-radius:26px;
  overflow:hidden;
  border:1px solid var(--line);
  background:
    radial-gradient(circle at 78% 14%, rgba(253,230,138,.22), transparent 18%),
    linear-gradient(to bottom,rgba(14,165,233,.20),transparent 45%),
    linear-gradient(to bottom,#14213a 0%,#0f172a 65%,#111827 65%);
}

.moon{
  position:absolute;
  top:28px;
  right:36px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:#fde68a;
  box-shadow:0 0 40px rgba(253,230,138,.45);
}

.station{
  position:absolute;
  left:32px;
  right:32px;
  bottom:132px;
  height:158px;
}

.roof{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:42px;
  background:linear-gradient(90deg,#263445,#64748b,#263445);
  clip-path:polygon(5% 0,95% 0,100% 100%,0 100%);
  box-shadow:0 12px 22px rgba(0,0,0,.25);
}

.building{
  position:absolute;
  left:22px;
  right:22px;
  top:40px;
  bottom:0;
  background:
    linear-gradient(90deg,rgba(255,255,255,.18) 0 1px,transparent 1px 100%),
    linear-gradient(180deg,#e5e7eb,#94a3b8);
  background-size:42px 100%, auto;
  border-radius:10px 10px 0 0;
  border:3px solid rgba(255,255,255,.18);
}

.clock{
  position:absolute;
  top:12px;
  left:50%;
  width:58px;
  height:58px;
  margin-left:-29px;
  border-radius:50%;
  background:radial-gradient(circle,#ffffff 0 58%,#e2e8f0 59% 100%);
  border:4px solid #1e293b;
  box-shadow:0 0 18px rgba(255,255,255,.28);
}

.clock::before,
.clock::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:50%;
  width:4px;
  border-radius:99px;
  background:#1e293b;
  transform-origin:50% 100%;
}

.clock::before{
  height:18px;
  margin-left:-2px;
  animation:clockHour 24s linear infinite;
}

.clock::after{
  height:23px;
  margin-left:-2px;
  background:#0f172a;
  animation:clockMinute 6s linear infinite;
}

.clockCenter{
  position:absolute;
  left:50%;
  top:50%;
  width:8px;
  height:8px;
  margin-left:-4px;
  margin-top:-4px;
  border-radius:50%;
  background:var(--red);
  z-index:3;
}

.windows{
  position:absolute;
  left:26px;
  right:26px;
  bottom:28px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.windows i{
  height:35px;
  display:block;
  border-radius:6px;
  background:linear-gradient(180deg,#bae6fd,#38bdf8);
  box-shadow:0 0 18px rgba(56,189,248,.35);
}

.platform{
  position:absolute;
  left:0;
  right:0;
  bottom:108px;
  height:24px;
  background:linear-gradient(90deg,#475569,#94a3b8,#475569);
}

.rails{
  position:absolute;
  left:0;
  right:0;
  bottom:62px;
  height:58px;
  background:repeating-linear-gradient(90deg,transparent 0 28px,rgba(255,255,255,.25) 28px 34px,transparent 34px 62px);
}

.rails::before,.rails::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  height:7px;
  background:#cbd5e1;
  border-radius:99px;
}

.rails::before{top:12px}
.rails::after{bottom:12px}

.train{
  position:absolute;
  left:34px;
  right:34px;
  bottom:82px;
  height:84px;
  border-radius:16px 54px 18px 16px;
  background:
    linear-gradient(180deg,#f8fafc 0 42%,#dbeafe 43% 48%,#ef4444 49% 58%,#1d4ed8 59% 100%);
  box-shadow:0 18px 25px rgba(0,0,0,.30);
  animation:trainFloat 2.6s ease-in-out infinite;
  overflow:visible;
}

.train::before{
  content:"";
  position:absolute;
  right:-6px;
  top:7px;
  width:76px;
  height:70px;
  border-radius:12px 52px 18px 10px;
  background:
    linear-gradient(135deg,#f8fafc 0 34%,#bae6fd 35% 58%,#1d4ed8 59% 100%);
  clip-path:polygon(0 0,72% 0,100% 35%,100% 100%,0 100%);
  box-shadow:inset -8px 0 0 rgba(15,23,42,.12);
}

.train::after{
  content:"";
  position:absolute;
  left:22px;
  right:24px;
  bottom:-13px;
  height:18px;
  background:
    radial-gradient(circle at 10% 50%,#0f172a 0 7px,transparent 8px),
    radial-gradient(circle at 32% 50%,#0f172a 0 7px,transparent 8px),
    radial-gradient(circle at 55% 50%,#0f172a 0 7px,transparent 8px),
    radial-gradient(circle at 78% 50%,#0f172a 0 7px,transparent 8px);
}

.headLight{
  position:absolute;
  right:2px;
  top:49px;
  width:18px;
  height:13px;
  border-radius:99px;
  background:#fef08a;
  box-shadow:0 0 24px #fef08a;
  z-index:4;
}

.cabWindow{
  position:absolute;
  right:16px;
  top:16px;
  width:42px;
  height:25px;
  border-radius:9px 22px 8px 8px;
  background:linear-gradient(180deg,#7dd3fc,#0284c7);
  z-index:3;
}

.win{
  position:absolute;
  top:16px;
  width:46px;
  height:25px;
  background:linear-gradient(180deg,#7dd3fc,#0ea5e9);
  border-radius:8px;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.20);
}

.w1{left:30px}
.w2{left:88px}
.w3{left:146px}
.w4{left:204px}

.door{
  position:absolute;
  top:14px;
  left:265px;
  width:34px;
  height:58px;
  border-radius:8px;
  border:2px solid rgba(15,23,42,.30);
  background:linear-gradient(180deg,#e0f2fe,#93c5fd);
}

.door::before{
  content:"";
  position:absolute;
  top:7px;
  left:6px;
  right:6px;
  height:17px;
  border-radius:5px;
  background:#0ea5e9;
}

.agent{
  position:absolute;
  bottom:128px;
  width:28px;
  height:60px;
  animation:bob 1.8s ease-in-out infinite;
}

.agent.one{left:66px}
.agent.two{right:72px;animation-delay:.4s}

.head{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#f3c79b;
  margin:auto;
}

.bodyAgent{
  width:28px;
  height:31px;
  margin-top:3px;
  background:linear-gradient(90deg,#fb923c 0 45%,#fde047 45% 55%,#fb923c 55%);
  border-radius:8px 8px 4px 4px;
}

.legs{
  width:22px;
  height:14px;
  margin:auto;
  background:linear-gradient(90deg,#0f172a 0 42%,transparent 42% 58%,#0f172a 58%);
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

@keyframes pulse{
  0%,80%,100%{opacity:.25;transform:translateY(0)}
  40%{opacity:1;transform:translateY(-5px)}
}

@keyframes bob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}

@keyframes trainFloat{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(8px)}
}

@keyframes signalPulse{
  0%,100%{opacity:.55}
  50%{opacity:1}
}

@keyframes clockMinute{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

@keyframes clockHour{
  from{transform:rotate(40deg)}
  to{transform:rotate(400deg)}
}

@media(max-width:820px){
  body{
    padding:12px;
    overflow:auto;
  }

  .page{
    min-height:auto;
    border-radius:22px;
  }

  .content{
    grid-template-columns:1fr;
    padding:28px;
    gap:30px;
  }

  .scene{
    height:360px;
  }

  .w4,.door{
    display:none;
  }
}

@media(max-width:440px){
  .content{
    padding:22px;
  }

  .loaderBlock{
    align-items:flex-start;
  }

  .wheel{
    width:74px;
    height:74px;
  }

  .scene{
    height:330px;
  }

  .train{
    left:20px;
    right:26px;
  }

  .win{
    width:38px;
  }

  .w1{left:24px}
  .w2{left:72px}
  .w3{left:120px}

  .station{
    left:20px;
    right:20px;
  }

  .clock{
    width:50px;
    height:50px;
    margin-left:-25px;
  }
}
</style>
</head>

<body>
  <main class="page">
    <div class="topbar">
      <div class="signal"></div>
      <span>Maintenance en cours</span>
    </div>

    <section class="content">
      <div>
        <h1>Site en maintenance</h1>
        <p>Nous nous excusons pour la gêne occasionnée. Le site sera opérationnel rapidement.</p>

        <div class="loaderBlock">
          <div class="wheel" aria-label="Chargement"></div>
          <div>
            <div class="loadingText">Intervention technique en cours</div>
            <div class="dots" aria-hidden="true">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>

      <div class="scene" aria-hidden="true">
        <div class="moon"></div>

        <div class="station">
          <div class="roof"></div>
          <div class="building">
            <div class="clock">
              <div class="clockCenter"></div>
            </div>
            <div class="windows">
              <i></i><i></i><i></i><i></i><i></i>
            </div>
          </div>
        </div>

        <div class="platform"></div>

        <div class="agent one">
          <div class="head"></div>
          <div class="bodyAgent"></div>
          <div class="legs"></div>
        </div>

        <div class="agent two">
          <div class="head"></div>
          <div class="bodyAgent"></div>
          <div class="legs"></div>
        </div>

        <div class="train">
          <span class="win w1"></span>
          <span class="win w2"></span>
          <span class="win w3"></span>
          <span class="win w4"></span>
          <span class="door"></span>
          <span class="cabWindow"></span>
          <span class="headLight"></span>
        </div>

        <div class="rails"></div>
      </div>
    </section>
  </main>
</body>
</html>
